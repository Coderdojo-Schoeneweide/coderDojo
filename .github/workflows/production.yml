name: Deploy Astro site to Production

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: 'pages-production'
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      stage: production

  deploy:
    environment:
      name: production
      url: https://${{ vars.CNAME }}/
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages

      - name: Extract tar archive
        run: tar -xvf artifact.tar && rm artifact.tar

      - name: Create CNAME entry for GitHub Pages
        run: echo -n $CNAME > CNAME
        env:
          CNAME: ${{ vars.CNAME }}

      - name: Push to coderdojo-schoeneweide.github.io repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: Coderdojo-Schoeneweide/coderdojo-schoeneweide.github.io
          publish_branch: master
          publish_dir: ./
